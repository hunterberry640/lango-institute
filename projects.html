<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects | Good Guys Roofing Company Inc.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8f6f3;
      font-family: 'Space Grotesk', sans-serif;
      color: #1a1a1a;
    }

    .promo {
      text-align: center;
      max-width: 560px;
      padding: 48px 32px;
    }

    .promo-logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 40px;
      text-decoration: none;
      color: inherit;
    }

    .promo-logo-row img {
      height: 64px;
      width: auto;
    }

    .promo-logo-text {
      font-size: 1.65rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    .logo-light {
      font-weight: 400;
    }

    .promo-message {
      font-size: 1.2rem;
      line-height: 1.7;
      color: #444;
    }

    .promo-message strong {
      color: #1a1a1a;
    }

    .back-link {
      display: inline-block;
      margin-top: 32px;
      font-size: 0.95rem;
      color: #6B1D2A;
      text-decoration: none;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: #E8622C;
    }
  </style>
</head>
<body>
  <div class="promo">
    <a href="https://hbdigitalsolutionstx.com" class="promo-logo-row" target="_blank" rel="noopener">
      <img src="./src/assets/logo_new_colors.png" alt="HB Digital Solutions" />
      <span class="promo-logo-text">HBDigital <span class="logo-light">Solutions</span></span>
    </a>
    <p class="promo-message">If you like this preview of what your site could look like, contact <strong>HB Digital Solutions</strong> and we'd love to do the rest!</p>
    <a href="./" class="back-link">&larr; Back to Home</a>
  </div>
</body>
</html>
