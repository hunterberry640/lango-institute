<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LanGo Institute — Coming Soon</title>
  <link rel="icon" type="image/jpeg" href="./src/assets/LanGo_favicon_RGB_orange.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FDF8F4;
      font-family: 'DM Sans', system-ui, sans-serif;
      color: #1a1a1a;
    }

    .promo {
      text-align: center;
      max-width: 560px;
      padding: 48px 32px;
    }

    .promo-logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 40px;
      text-decoration: none;
      color: inherit;
    }

    .promo-logo-row img {
      height: 64px;
      width: auto;
    }

    .promo-message {
      font-size: 1.2rem;
      line-height: 1.7;
      color: #5a5a5a;
    }

    .promo-message strong {
      color: #1a1a1a;
    }

    .promo-visit {
      display: inline-block;
      margin-top: 24px;
      padding: 14px 32px;
      background: #E8622C;
      color: #fff;
      font-weight: 700;
      font-size: .95rem;
      border-radius: 50px;
      text-decoration: none;
      transition: background .3s, transform .3s;
    }

    .promo-visit:hover {
      background: #c9481a;
      transform: translateY(-2px);
    }

    .back-link {
      display: inline-block;
      margin-top: 20px;
      font-size: .9rem;
      color: #1B3A6B;
      text-decoration: none;
      font-weight: 600;
      letter-spacing: .3px;
      transition: color .2s;
    }

    .back-link:hover {
      color: #E8622C;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: #E8622C;
      border-radius: 2px;
      margin: 28px auto;
    }

    .hb-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 40px;
      text-decoration: none;
      color: #5a5a5a;
      font-size: .85rem;
    }

    .hb-row img {
      height: 40px;
      width: auto;
    }

    .hb-row span {
      font-weight: 600;
      color: #1a1a1a;
    }
  </style>
</head>
<body>
  <div class="promo">
    <p class="promo-message">If you like this landing page, we&rsquo;d love to <strong>build the rest of your website</strong> for you. Let&rsquo;s turn this preview into a full, high-converting site.</p>
    <a href="https://hbdigitalsolutionstx.com" class="promo-visit" target="_blank" rel="noopener">Contact HB Digital</a>
    <br />
    <a href="./" class="back-link">&larr; Back to Landing Page</a>

    <div class="divider"></div>

    <a href="https://hbdigitalsolutionstx.com" class="hb-row" target="_blank" rel="noopener">
      <img src="./src/assets/logo_new_colors.png" alt="HB Digital Solutions" />
      <span>A preview by HB Digital Solutions</span>
    </a>
  </div>
</body>
</html>
